<!DOCTYPE html>
<html lang="en">
<head>

  <title>Dining</title>

  <!-- css -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

      <p>Header</p>

    <!-- nav -->

      <h2 class="page-title">Dining options</h2>

          <button id="lunch-btn">Lunch</button>

        <p id="menu-info"></p>

      <div class="gallery">
        <div class="img-box">Image</div>

      <!-- back button -->
